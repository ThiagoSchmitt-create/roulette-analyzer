# Sobe API + dashboard juntos.
# Local:    docker compose up --build   (dashboard em http://localhost:8501)
# Easypanel: pode importar como servico "Compose", OU criar 2 apps (um por Dockerfile).
#
# O dashboard alcanca a API pelo nome do servico (rede interna): API_BASE_URL=http://api:8000
# O n8n (no Easypanel) deve apontar para a URL da API (interna do projeto, ou o dominio publico).
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
